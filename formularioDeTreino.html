<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerador de Ficha de Treino</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/icons/gorila192.png" type="image/png">

    <meta name="theme-color" content="#ffffff">
</head>

<body>
    

    <div id="splash-screen">
        <img src="assets/icons/gorila512.png">
        <h1>Ficha de Treino</h1>
    </div>

    <div class="app">

        <!-- Tela 1 - Alunos e fichas salvas -->
        <div id="tela-alunos">
            <h2>Fichas Salvas</h2>

            <input type="text" id="buscarAluno" placeholder="Buscar aluno..." class="form-control">

            <button type="button" id="instalarApp" class="btn btn-secondary">
                Instalar App
            </button>

            <div id="lista-fichas"></div>

            <!-- Container para botões -->
            <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-start;">
                <button id="novaFicha" class="btn btn-primary">
                    Nova Ficha
                </button>

                <button id="voltarParaAlunos" class="btn btn-secondary" style="display: none;">
                    Voltar
                </button>
            </div>
        </div>

        <!-- Tela 2 - Editor de treino -->
        <div id="tela-editor" style="display: none;">
            <h2>Criar Ficha de Treino</h2>

            <div class="form-group">
                <input id="nome" placeholder="Nome do aluno" class="form-control">
            </div>
            
            <div class="form-group">
                <input id="objetivo" placeholder="Objetivo" class="form-control">
            </div>
            
            <div class="form-group">
                <input id="nomeFicha" placeholder="Nome da Ficha" class="form-control">
            </div>

            <div id="dias-container"></div>

            <!-- Toolbar com botões padronizados -->
            <div class="toolbar" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
                <button type="button" id="adicionarDia" class="btn btn-primary">
                    + Adicionar dia
                </button>

                <button type="button" onclick="gerarFicha()" class="btn btn-action">
                    👁 Visualizar Ficha
                </button>

                <button type="button" id="salvarFicha" class="btn btn-success">
                     Salvar Ficha
                </button>

                <button type="button" id="voltarLista" class="btn btn-secondary">
                    ← Voltar
                </button>
            </div>
        </div>

        <!-- Tela 3 - Visualização de ficha -->
        <div id="tela-visualizar" style="display: none;">
            <div id="ficha"></div>

            <div class="toolbar" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
                <button type="button" id="gerarPDF" class="btn btn-action">
                 Gerar PDF
                </button>

                <button type="button" id="voltarEditor" class="btn btn-secondary">
                    ← Voltar
                </button>
            </div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>

</body>

</html>
