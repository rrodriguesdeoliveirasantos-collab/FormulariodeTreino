<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerador de Ficha de Treino</title>

    <link rel="stylesheet" href="assets/css/style.css">


    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/icons/gorila192.png">

    <meta name="theme-color" content="#ffffff">
</head>

<body>


    <div id="splash-screen">
        <img src="assets/icons/gorila512.png">
        <h1>Ficha de Treino</h1>
    </div>

    <div class="app">

        <!-- Tela 1 de alunos e fichas salvas -->
        <div id="tela-alunos">



            <h2>Fichas Salvas</h2>

            <input type="text" id="buscarAluno" placeholder="Buscar aluno...">

            <button type="button" id="instalarApp">
                Instalar App
            </button>

            <div id="lista-fichas"></div>

            <button id="novaFicha">
                Nova Ficha
            </button>

        </div>


        <!-- Tela 2 de editor de treino -->
        <div id="tela-editor" style="display: none;">

            <h2>Criar ficha</h2>

            <input id="nome" placeholder="Nome do aluno">
            <input id="objetivo" placeholder="Objetivo">
            <input id="nomeFicha" placeholder="Nome da Ficha">

            <div id="dias-container"></div>

            <button type="button" id="adicionarDia">
                Adicionar dia
            </button>

            <button type="button" onclick="gerarFicha()">
                Visializar Ficha
            </button>


            <button type="button" id="salvarFicha">
                Salvar Ficha
            </button>

            <button type="button" id="voltarLista">
                Voltar
            </button>
        </div>


        <!-- Tela 3 de visualização de ficha -->
        <div id="tela-visualizar" style="display: none;">

            <div id="ficha"></div>

            <button type="button" id="gerarPDF">
                gerarPDF
            </button>

            <button type="button" id="voltarEditor">
                Voltar
            </button>


        </div>

    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>

    <script type="module" src="assets/js/main.js"></script>

</body>

</html>
