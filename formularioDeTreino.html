<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerador de Ficha de Treino</title>
    
    <link rel="stylesheet" href="assets/css/style.css">


    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/icons/gorila192.png">

    <meta name="theme-color" content="#ffffff">
</head>

<body>


    <div id="splash-screen">
            <img src="assets/icons/gorila512.png">
        <h1>Ficha de Treino</h1>


    <div class="app">


        <form class="formulario">

            <input id="nome" placeholder="Nome do aluno">
            <input id="objetivo" placeholder="Objetivo">

            <h2>Treinos</h2>

            <div id="dias-container"></div>

            <button type="button" id="adicionarDia"> Adicionar dia</button>

            <br><br>


            <button type="button" id="salvarFicha">Salvar Ficha</button>

            <button type="button" id="gerarPDF">Gerar PDF</button>

            <button type="button" id="limparFormulario">Limpar Formulário</button>

            <button type="button" id="instalarApp" style="display: none;">
                Instalar App</button>

    </div>

    <hr>

    <h2>Fichas salvas</h2>

    <div id="lista-fichas"></div>

    <div id="fichar"></div>

    <div id="ficha"></div>

    </div>

    <script src="assets/js/script.js"></script>

</body>

</html>
